{% for conv in conversations %}
<a href="/conversations/{{ conv.id }}/view"
   data-conv-id="{{ conv.id }}"
   class="flex flex-col px-2.5 py-2 rounded text-left transition-colors
          {% if current_conv_id is defined and conv.id == current_conv_id %}
            bg-zinc-200 dark:bg-zinc-800/80
          {% else %}
            hover:bg-zinc-100 dark:hover:bg-zinc-800/60
          {% endif %}">
  <span class="conv-title text-xs font-medium truncate
               {% if current_conv_id is defined and conv.id == current_conv_id %}
                 text-zinc-900 dark:text-zinc-100
               {% else %}
                 text-zinc-600 dark:text-zinc-300
               {% endif %}">
    {{ conv.title }}
  </span>
  <span class="text-xs mt-0.5 text-zinc-400 dark:text-zinc-600">
    {{ conv.iteration_count }} iter · {{ conv.last_active_at[:10] }}
  </span>
</a>
{% else %}
<p class="text-xs px-2.5 py-3 text-zinc-400 dark:text-zinc-700">
  No investigations yet.
</p>
{% endfor %}
